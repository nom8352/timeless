<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Thank You - Timeless Photography Brisbane</title>
    
    <link rel="stylesheet" href="public_html/wp-content/themes/photography/css/reset.css" type="text/css" media="all" />
    <link rel="stylesheet" href="public_html/wp-content/themes/photography/css/wordpress.css" type="text/css" media="all" />
    <link rel="stylesheet" href="public_html/wp-content/themes/photography/css/screen.css" type="text/css" media="all" />
    <link rel="stylesheet" href="public_html/wp-content/themes/photography/css/grid.css" type="text/css" media="all" />
    <link rel="stylesheet" href="style.css" type="text/css" media="all" />
    <style>
        .thankyou-section {
            text-align: center;
            padding: 120px 20px 100px;
            min-height: 50vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .thankyou-icon {
            width: 80px;
            height: 80px;
            background: #222;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        .thankyou-icon svg {
            width: 40px;
            height: 40px;
            stroke: #fff;
        }
        .thankyou-section h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: #222;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .thankyou-section p {
            font-family: 'Hind', sans-serif;
            font-size: 16px;
            color: #666;
            max-width: 500px;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .thankyou-btn {
            display: inline-block;
            padding: 14px 40px;
            background: #222;
            color: #fff;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: background 0.3s;
        }
        .thankyou-btn:hover {
            background: #444;
        }
    </style>
</head>
<body class="page-template-default page thankyou">
    
    <header class="site-header">
        <div class="header-inner">
            <div class="logo">
                <a href="index.html">
                    <img src="Assets/Logos/logo-main-black-brisbane-photography.png" alt="Timeless Photography Brisbane">
                </a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="services.html">SERVICES</a></li>
                    <li><a href="gallery.html">GALLERY</a></li>
                    <li><a href="pricing.html">PRICING</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                </ul>
            </nav>
            <div class="mobile-menu-toggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <div id="wrapper">
        <div class="thankyou-section">
            <div class="thankyou-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h2>THANK YOU</h2>
            <p>Your message has been sent successfully. We will get back to you as soon as possible. Thank you for choosing Timeless Photography Brisbane.</p>
            <a href="index.html" class="thankyou-btn">Back to Home</a>
        </div>
    </div>
    
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-logo">
                <img src="Assets/Logos/logo-main-black-brisbane-photography.png" alt="Timeless Photography Brisbane">
            </div>
            <div class="footer-social"></div>
            <p class="copyright">&copy; 2026 Timeless Photography Brisbane. All rights reserved.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
